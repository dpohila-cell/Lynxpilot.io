<header class="site-header custom-header" role="banner">
  <div class="wrapper header-wrapper">

    <a class="brand" rel="author" href="{{ "/" | relative_url }}">
      <img class="brand-logo" src="{{ "/assets/logo.png" | relative_url }}" alt="Lynxpilot logo">
      <span class="brand-name">Lynx</span>
    </a>

    <button class="menu-toggle" id="menuToggle" aria-label="Open menu" aria-expanded="false" aria-controls="siteNav">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="site-nav" id="siteNav">
      <a class="page-link" href="/">Home</a>
      <a class="page-link" href="/services/">Services</a>
      <a class="page-link" href="/about/">About</a>
      <a class="page-link" href="/contact/">Contact</a>
    </nav>

  </div>
</header>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const toggle = document.getElementById("menuToggle");
  const nav = document.getElementById("siteNav");

  if (!toggle || !nav) return;

  toggle.addEventListener("click", function () {
    const isOpen = nav.classList.toggle("nav-open");
    toggle.classList.toggle("is-open", isOpen);
    toggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
  });

  document.addEventListener("click", function (event) {
    const clickedInsideNav = nav.contains(event.target);
    const clickedToggle = toggle.contains(event.target);

    if (!clickedInsideNav && !clickedToggle) {
      nav.classList.remove("nav-open");
      toggle.classList.remove("is-open");
      toggle.setAttribute("aria-expanded", "false");
    }
  });
});
</script>
