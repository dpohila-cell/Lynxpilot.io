<header class="site-header custom-header" role="banner">
  <div class="wrapper header-wrapper">
    <a class="brand" rel="author" href="{{ "/" | relative_url }}">
      <img class="brand-logo" src="{{ "/assets/logo.png" | relative_url }}" alt="Lynxpilot logo">
    </a>

    <nav class="site-nav">
      <input type="checkbox" id="nav-trigger" class="nav-trigger" />
      <label for="nav-trigger">
        <span class="menu-icon"></span>
      </label>

      <div class="trigger">
        {% for path in site.header_pages %}
          {% assign page = site.pages | where: "path", path | first %}
          {% if page.title %}
            <a class="page-link" href="{{ page.url | relative_url }}">{{ page.title }}</a>
          {% endif %}
        {% endfor %}
      </div>
    </nav>
  </div>
</header>
